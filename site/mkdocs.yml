site_name: spring-ai-test-tools 0.1.0
site_description: Test Spring AI ChatClient/EmbeddingModel code -- real model, explicit stub, or record/replay, chosen per test
site_url: https://rifatcakir.github.io/spring-ai-test-tools/
repo_url: https://github.com/rifatcakir/spring-ai-test-tools
repo_name: rifatcakir/spring-ai-test-tools
edit_uri: edit/main/site/docs/
copyright: An independent, community-maintained project. Not affiliated with, endorsed by, or an official project of Broadcom, VMware, Spring, or Spring AI.

docs_dir: docs
site_dir: ../.site-build

theme:
  name: material
  font: false
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    # Reference-docs nav (modeled on docs.spring.io/spring-ai/reference, not the
    # spring.io marketing landing page): a hierarchical, collapsible left tree with
    # breadcrumbs, not a top tab bar. navigation.tabs was tried and reverted -- top
    # tabs read as a marketing-site pattern, not a reference-docs one.
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - content.action.edit
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
    - toc.follow
    # toc.integrate deliberately NOT set -- keeps the page-local "on this page" table of
    # contents in its own right-hand rail, matching the reference-docs three-column
    # layout (left nav / content / right TOC), rather than folding it into the left nav.

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Getting Started:
      - Quick Start: quick-start.md
      - Stubbing: stub.md
      - Record & Replay: record-replay.md
  - Guides:
      - Tool Calling: tool-calling.md
      - Structured Output: structured-output.md
      - Streaming: streaming.md
      - Embeddings: embeddings.md
      - Prompt Normalizer & Redactor: prompt-normalizer-and-redactor.md
      - Assertions: assertions.md
      - Evaluator: evaluator.md
  - Reference:
      - Configuration: configuration.md
